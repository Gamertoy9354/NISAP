<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <link rel="stylesheet" href="static/profile.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    
    <div class="profile-page-wrapper">

        <a href="/index" class="back-to-services-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Back to Services
        </a>

        <div class="profile-card">
            
            <div class="profile-header">
                <img class="pfp" src="static/shis-2.png" alt="Profile Picture">
                <div class="header-info">
                    <h2 id="username">Loading...</h2>
                    <p id="email">Loading...</p>
                </div>
            </div>

            <div class="profile-body">
                <h3>Profile Details</h3>
                <div class="info-grid">
                    <div class="info-field">
                        <label>First Name</label>
                        <p class="flname" id="firstname">Loading...</p>
                    </div>
                    <div class="info-field">
                        <label>Last Name</label>
                        <p class="flname" id="lastname">Loading...</p>
                    </div>
                </div>
            </div>

            <div class="profile-actions">
                <a href="{{url_for('dashboard_page')}}"><button class="btn btn-primary">Dashboard</button></a>
                <a href="{{url_for('logout')}}"><button class="btn btn-secondary">Logout</button></a>
            </div>
        </div>
    </div>

    <script src="static/profile.js"></script>
</body>
</html>
