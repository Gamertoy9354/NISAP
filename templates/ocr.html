<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extract School Data from Image</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- Light Theme Variables & Base --- */
        :root {
            --primary-color: #1a73e8; /* Professional Blue */
            --text-dark: #202124;
            --text-grey: #5f6368;
            --bg-light: #f4f6f8;
            --card-bg: #ffffff;
            --input-border: #e0e0e0;
            --border-radius: 12px;
            --shadow-soft: 0 4px 12px rgba(0, 0, 0, 0.08);
            font-family: 'Inter', sans-serif;
            color: var(--text-dark);
        }

        body {
            background-color: var(--bg-light); /* Light background */
            color: var(--text-dark);
            margin: 0;
            padding: 40px 20px; /* More padding top/bottom */
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        /* Removed .circle and @keyframes circle */

        .page-wrapper { /* Added wrapper for max-width and positioning */
            width: 100%;
            max-width: 800px;
            position: relative; /* For back button */
            padding-top: 40px; /* Space for back button */
        }

         /* --- Back Button --- (Similar to profile page) */
        .back-to-services-btn {
            position: absolute;
            top: 0px;
            left: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background-color: transparent;
            color: var(--text-grey);
            border: 1px solid var(--input-border); /* Add border */
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: background-color 0.2s ease, border-color 0.2s ease;
        }
        .back-to-services-btn:hover {
            background-color: #e9ecef;
            border-color: #ccc;
        }
        .back-to-services-btn svg {
            width: 18px;
            height: 18px;
        }


        /* --- Main Content Card --- */
        .container {
            width: 100%;
            background-color: var(--card-bg); /* White card */
            border: 1px solid var(--input-border); /* Light border */
            border-radius: var(--border-radius);
            padding: 24px 32px;
            box-sizing: border-box;
            box-shadow: var(--shadow-soft); /* Soft shadow */
        }

        h1, h2 {
            text-align: center;
            color: var(--text-dark); /* Dark text */
            border-bottom: 1px solid var(--input-border); /* Lighter border */
            padding-bottom: 15px; /* Increased padding */
            margin-bottom: 20px; /* Spacing below header */
        }
        h1 { font-size: 1.8rem; font-weight: 700; }
        h2 { font-size: 1.4rem; font-weight: 600; margin-top: 30px; } /* Spacing above h2 */

        p {
            text-align: center;
            color: var(--text-grey); /* Grey description text */
            margin-top: -10px;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        /* --- Upload Form --- */
        #ocr-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px; /* More space below upload */
        }

        #image-upload-label { /* Style the label as the drop zone */
            border: 2px dashed var(--primary-color); /* Blue dashed border */
            border-radius: 8px;
            padding: 30px 20px; /* More padding */
            text-align: center;
            cursor: pointer;
            background-color: #f8f9fa; /* Very light grey */
            color: var(--text-grey);
            transition: background-color 0.2s ease, border-color 0.2s ease;
            display: block; /* Make label block-level */
            /* Added for text overflow */
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        #image-upload-label:hover {
            background-color: #eef2f5;
            border-color: #145dbf;
        }
        #image-upload {
             display: none; /* Hide the actual file input */
        }
        .upload-icon { /* Simple icon */
            font-size: 2rem;
            margin-bottom: 10px;
            color: var(--primary-color);
            display: block; /* Make icon block */
        }


        /* --- Loader --- */
        .loader {
            display: none;
            margin: 30px auto; /* More margin */
            border: 5px solid #e9ecef; /* Light grey base */
            border-top: 5px solid var(--primary-color); /* Blue spinner */
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- Confirmation Form --- */
        #confirmation-area { display: none; }

        #final-submit-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); /* Responsive columns */
            gap: 20px;
        }

        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group.full-width { grid-column: 1 / -1; }

        .form-group label {
            font-weight: 500; /* Regular weight */
            font-size: 0.9rem;
            color: var(--text-dark); /* Dark label text */
        }

        .form-group input[type="text"],
        .form-group input[type="number"],
        .form-group input[type="url"],
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--input-border); /* Consistent border */
            color: var(--text-dark); /* Dark text */
            border-radius: 6px; /* Slightly less rounded */
            box-sizing: border-box;
            font-size: 1rem;
            background-color: var(--card-bg); /* White background */
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
             outline: none;
             border-color: var(--primary-color);
             box-shadow: 0 0 0 1px var(--primary-color);
        }

        /* Disabled fields styling */
        .form-group input:disabled,
        .form-group select:disabled,
        .form-group textarea:disabled {
            background-color: #f8f9fa; /* Light grey background */
            color: var(--text-grey); /* Grey text */
            cursor: not-allowed;
            border-color: #e9ecef; /* Lighter border */
        }
         /* Specific readonly styles for calculated fields */
        #f-num_students, #f-teacher_student_ratio, #f-grade_enrollment_data_display {
            background-color: #e9ecef !important; /* Lighter grey for readonly */
            font-weight: 500;
             color: #495057;
             cursor: default;
        }


        /* --- Buttons --- */
        .button {
            padding: 12px 25px;
            border: none;
            border-radius: 8px; /* Consistent radius */
            cursor: pointer;
            font-size: 0.95rem; /* Slightly larger */
            font-weight: 600;
            transition: background-color 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .button-primary {
            background-color: var(--primary-color); /* Blue */
            color: white;
             width: 100%; /* Full width for initial upload */
             box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .button-primary:hover {
            background-color: #145dbf; /* Darker blue */
             box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }
        .button-primary:disabled { /* Style for disabled state */
            background-color: #a0c3f0;
            cursor: not-allowed;
            box-shadow: none;
        }


        .button-secondary {
            background-color: var(--card-bg); /* White */
            color: var(--text-grey);
            border: 1px solid var(--input-border); /* Grey border */
        }
        .button-secondary:hover {
            background-color: #f8f9fa; /* Light grey hover */
            border-color: #ccc;
        }

        .button-success {
            background-color: #198754; /* Green */
            color: white;
            border: 1px solid #198754;
        }
        .button-success:hover {
            background-color: #157347; /* Darker green */
             border-color: #146c43;
        }
        .button-success:disabled { /* Disabled state for confirm button */
             background-color: #a3cfb4;
             border-color: #a3cfb4;
             cursor: not-allowed;
         }


        .button-container {
            grid-column: 1 / -1;
            display: flex;
            gap: 15px; /* More gap */
            justify-content: flex-end; /* Align right */
            margin-top: 25px; /* More margin */
             padding-top: 20px; /* Spacing above buttons */
             border-top: 1px solid var(--input-border); /* Separator line */
        }

        /* Responsive */
         @media (max-width: 600px) {
             body { padding: 20px 10px; }
             .page-wrapper { padding-top: 50px; } /* More space for back button */
             .container { padding: 15px 20px; }
             h1 { font-size: 1.5rem; }
             h2 { font-size: 1.2rem; }
             #final-submit-form { grid-template-columns: 1fr; } /* Single column on mobile */
             .button-container { flex-direction: column-reverse; gap: 10px; } /* Stack buttons */
             .button-container .button { width: 100%; } /* Full width buttons */
             .back-to-services-btn { top: 10px; left: 10px; }
         }

    </style>
</head>
<body>
    <div class="page-wrapper">

        <a href="{{ url_for('index') }}" class="back-to-services-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Back to Services
        </a>

        <div class="container">
            <h1>Extract Data from Image</h1>
            <p>
                Upload a photo of your handwritten school register data. Our AI will extract the details for you to review.
            </p>

            <form id="ocr-form">
                <label for="image-upload" id="image-upload-label">
                    <span class="upload-icon">📄</span> <span id="upload-text">Click or Drag & Drop Image Here</span> </label>
                <input type="file" id="image-upload" accept="image/*" required>
                <button type="submit" class="button button-primary">Extract Data</button>
            </form>

            <div class="loader" id="loader"></div>

            <div id="confirmation-area">
                <h2>Review Extracted Data</h2>
                <p>
                    The AI has extracted the following data. Please review it carefully. Click "Edit Data" to make changes before saving.
                </p>

                <form id="final-submit-form" action="/submit-school-data" method="POST">
                    <div class="form-group"><label for="f-school_name">School Name</label><input type="text" id="f-school_name" name="school_name"></div>
                     <div class="form-group"><label for="f-school_type">School Type</label><select id="f-school_type" name="school_type"><option value="">--Select Type--</option><option value="gov">Government</option><option value="private">Private</option><option value="trust">Trust</option></select></div>
                     <div class="form-group full-width"><label for="f-location">Location</label><input type="text" id="f-location" name="location"></div>
                     <div class="form-group"><label for="f-year_establishment">Year of Establishment</label><input type="number" id="f-year_establishment" name="year_establishment" min="1800" max="2025"></div>
                     <div class="form-group"><label for="f-num_grades">How many grades?</label><input type="number" id="f-num_grades" name="num_grades" min="1"></div>
                     <div class="form-group"><label for="f-num_students">Total Students (Calculated)</label><input type="number" id="f-num_students" name="num_students" readonly></div>
                     <div class="form-group"><label for="f-avg_attendance_rate">Avg. Attendance Rate (%)</label><input type="number" id="f-avg_attendance_rate" name="avg_attendance_rate" step="0.1" min="0" max="100"></div>
                     <div class="form-group"><label for="f-gender_ratio">Gender Ratio (M:F)</label><input type="text" id="f-gender_ratio" name="gender_ratio" placeholder="e.g., 55:45"></div>
                     <div class="form-group"><label for="f-students_special_needs">Students with Special Needs</label><input type="number" id="f-students_special_needs" name="students_special_needs" min="0"></div>
                     <input type="hidden" id="f-grade_enrollment_data" name="grade_enrollment_data">
                     <div class="form-group full-width"><label for="f-enrollment_trends">Enrollment Trends (Past 3 Years, comma-separated)</label><input type="text" id="f-enrollment_trends" name="enrollment_trends" placeholder="e.g., 250, 275, 300"></div>
                     <div class="form-group full-width"><label for="f-grade_enrollment_data_display">Per-Grade Enrollment (Review Only)</label><textarea id="f-grade_enrollment_data_display" rows="3" readonly title="Edit the hidden 'grade_enrollment_data' field or re-upload to change this."></textarea></div>
                     <div class="form-group"><label for="f-num_teachers">Number of Teachers</label><input type="number" id="f-num_teachers" name="num_teachers" min="0"></div>
                     <div class="form-group"><label for="f-teacher_student_ratio">Teacher-Student Ratio (Calculated)</label><input type="text" id="f-teacher_student_ratio" name="teacher_student_ratio" readonly></div>
                     <div class="form-group"><label for="f-teacher_qualifications">Avg. Teacher Qualifications</label><input type="text" id="f-teacher_qualifications" name="teacher_qualifications" placeholder="e.g., B.Ed, M.Sc"></div>
                     <div class="form-group"><label for="f-avg_teacher_experience">Avg. Teacher Experience (Years)</label><input type="number" id="f-avg_teacher_experience" name="avg_teacher_experience" step="0.1" min="0"></div>
                     <div class="form-group"><label for="f-classrooms_avail">Classrooms</label><select id="f-classrooms_avail" name="classrooms_avail"><option value="Available">Available</option> <option value="Partial">Partial</option> <option value="Not Available">Not Available</option></select></div>
                     <div class="form-group"><label for="f-labs_avail">Labs</label><select id="f-labs_avail" name="labs_avail"><option value="Available">Available</option> <option value="Partial">Partial</option> <option value="Not Available">Not Available</option></select></div>
                     <div class="form-group"><label for="f-toilets_avail">Toilets</label><select id="f-toilets_avail" name="toilets_avail"><option value="Available">Available</option> <option value="Partial">Partial</option> <option value="Not Available">Not Available</option></select></div>
                     <div class="form-group"><label for="f-electricity_avail">Electricity</label><select id="f-electricity_avail" name="electricity_avail"><option value="Available">Available</option> <option value="Partial">Partial</option> <option value="Not Available">Not Available</option></select></div>
                     <div class="form-group"><label for="f-water_avail">Drinking Water</label><select id="f-water_avail" name="water_avail"><option value="Available">Available</option> <option value="Partial">Partial</option> <option value="Not Available">Not Available</option></select></div>
                     <div class="form-group"><label for="f-digital_infra">Digital Infrastructure</label><input type="text" id="f-digital_infra" name="digital_infra" placeholder="e.g., Computers, Internet"></div>
                     <div class="form-group"><label for="f-perf_math">Avg. Math Score (%)</label><input type="number" id="f-perf_math" name="perf_math" step="0.1" min="0" max="100"></div>
                     <div class="form-group"><label for="f-perf_science">Avg. Science Score (%)</label><input type="number" id="f-perf_science" name="perf_science" step="0.1" min="0" max="100"></div>
                     <div class="form-group"><label for="f-perf_hindi">Avg. Hindi Score (%)</label><input type="number" id="f-perf_hindi" name="perf_hindi" step="0.1" min="0" max="100"></div>
                     <div class="form-group"><label for="f-perf_mother_lang">Avg. Mother Language Score (%)</label><input type="number" id="f-perf_mother_lang" name="perf_mother_lang" step="0.1" min="0" max="100"></div>
                     <div class="form-group"><label for="f-perf_english">Avg. English Score (%)</label><input type="number" id="f-perf_english" name="perf_english" step="0.1" min="0" max="100"></div>
                     <div class="form-group"><label for="f-curriculum_completion">Curriculum Completion (%)</label><input type="number" id="f-curriculum_completion" name="curriculum_completion" step="0.1" min="0" max="100"></div>
                     <div class="form-group full-width"><label for="f-professional_dept">Professional Development</label><input type="text" id="f-professional_dept" name="professional_dept" placeholder="e.g., NEP workshops"></div>
                     <div class="form-group full-width"><label for="f-nep_participation">NEP-Aligned Activities</label><textarea id="f-nep_participation" name="nep_participation" rows="3" placeholder="Describe participation..."></textarea></div>

                    <div class="button-container">
                        <button type="button" id="edit-button" class="button button-secondary">Edit Data</button>
                        <button type="submit" id="confirm-button" class="button button-success">Confirm & Save Data</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const ocrForm = document.getElementById("ocr-form");
            const finalSubmitForm = document.getElementById("final-submit-form");
            const loader = document.getElementById("loader");
            const confirmationArea = document.getElementById("confirmation-area");
            const editButton = document.getElementById("edit-button");
            const imageUpload = document.getElementById("image-upload");
            const uploadLabel = document.getElementById("image-upload-label");
            const uploadText = document.getElementById("upload-text"); // Span containing the text

            // --- NEW: Event listener for file selection ---
            imageUpload.addEventListener('change', function() {
                if (this.files && this.files.length > 0) {
                    const fileName = this.files[0].name;
                    uploadText.textContent = `Selected: ${fileName}`; // Update text to show filename
                    // Optionally, reset confirmation area if a new file is chosen after results were shown
                    confirmationArea.style.display = "none";
                     setFormFieldsDisabled(true); // Re-disable form if new file selected
                     editButton.style.display = 'inline-block'; // Show edit button again
                     editButton.disabled = false; // Enable edit button
                     document.getElementById('confirm-button').disabled = true; // Disable confirm button
                } else {
                     uploadText.textContent = 'Click or Drag & Drop Image Here'; // Reset if no file selected
                }
            });
            // --- END NEW ---


            function setFormFieldsDisabled(disabled) {
                const inputs = finalSubmitForm.querySelectorAll('input, select, textarea');
                inputs.forEach(input => {
                    if (input.type === 'button' || input.type === 'submit' || input.type === 'hidden') return;
                    if (input.id === 'f-num_students' || input.id === 'f-teacher_student_ratio' || input.id === 'f-grade_enrollment_data_display') return;
                    input.disabled = disabled;
                });
                 document.getElementById('confirm-button').disabled = disabled;
            }

            ocrForm.addEventListener("submit", async (e) => {
                e.preventDefault();
                const file = imageUpload.files[0];
                if (!file) { alert("Please select an image file."); return; }

                loader.style.display = "block";
                confirmationArea.style.display = "none";
                ocrForm.querySelector('button').disabled = true;

                const formData = new FormData();
                formData.append("image", file);

                try {
                    const response = await fetch("/extract-from-image", { method: "POST", body: formData });
                    if (!response.ok) { const err = await response.json(); throw new Error(err.error || `HTTP error! status: ${response.status}`); }
                    const data = await response.json();
                    populateConfirmationForm(data);
                    loader.style.display = "none";
                    confirmationArea.style.display = "block";
                    setFormFieldsDisabled(true);
                    editButton.style.display = 'inline-block';
                    editButton.disabled = false;
                    // Keep the filename displayed after successful extraction
                    uploadText.textContent = `Extracted from: ${file.name}. Upload new?`;

                } catch (error) {
                    loader.style.display = "none";
                    alert(`Error extracting data: ${error.message}`);
                    console.error("Extraction error:", error);
                     uploadText.textContent = 'Click or Drag & Drop Image Here'; // Reset label on error
                     imageUpload.value = ''; // Clear the file input on error
                } finally {
                     ocrForm.querySelector('button').disabled = false;
                }
            });

            editButton.addEventListener("click", () => {
                setFormFieldsDisabled(false);
                alert("Form is now editable. Please review all fields before saving.");
                editButton.disabled = true;
            });

            finalSubmitForm.addEventListener("submit", (e) => {
                 if (document.getElementById('f-school_name').disabled) {
                     e.preventDefault();
                     alert("Please click 'Edit Data' before saving.");
                     return;
                 }
                loader.style.display = "block";
                document.getElementById('confirm-button').disabled = true;
                editButton.disabled = true;
            });

            function populateConfirmationForm(data) {
                // Populate logic remains exactly the same...
                 document.getElementById("f-school_name").value = data.school_name || ""; document.getElementById("f-school_type").value = data.school_type || ""; document.getElementById("f-location").value = data.location || ""; document.getElementById("f-year_establishment").value = data.year_establishment || "";
                 document.getElementById("f-num_grades").value = data.num_grades || ""; document.getElementById("f-num_students").value = data.num_students || 0; document.getElementById("f-avg_attendance_rate").value = data.avg_attendance_rate || 0; document.getElementById("f-gender_ratio").value = data.gender_ratio || ""; document.getElementById("f-students_special_needs").value = data.students_special_needs || 0;
                 const gradeData = data.total_students_per_grade || {}; document.getElementById("f-grade_enrollment_data").value = JSON.stringify(gradeData); document.getElementById("f-grade_enrollment_data_display").value = JSON.stringify(gradeData, null, 2);
                 const trends = data.enrollment_trends_of_past_3_years || []; document.getElementById("f-enrollment_trends").value = trends.join(", ");
                 document.getElementById("f-num_teachers").value = data.num_teachers || 0; document.getElementById("f-teacher_student_ratio").value = data.teacher_to_student_ratio || ""; document.getElementById("f-teacher_qualifications").value = data.teacher_qualifications || ""; document.getElementById("f-avg_teacher_experience").value = data.avg_teacher_experience || 0;
                 const infra = data.infra_availability || {}; document.getElementById("f-classrooms_avail").value = infra.classrooms || "Available"; document.getElementById("f-labs_avail").value = infra.labs || "Available"; document.getElementById("f-toilets_avail").value = infra.toilets || "Available"; document.getElementById("f-electricity_avail").value = infra.electricity || "Available"; document.getElementById("f-water_avail").value = infra.water || "Available"; document.getElementById("f-digital_infra").value = data.digital_infra || "";
                 const scores = data.performance_scores || {}; document.getElementById("f-perf_math").value = scores.math || 0; document.getElementById("f-perf_science").value = scores.science || 0; document.getElementById("f-perf_hindi").value = scores.hindi || 0; document.getElementById("f-perf_mother_lang").value = scores.mother_language || 0; document.getElementById("f-perf_english").value = scores.english || 0;
                 document.getElementById("f-curriculum_completion").value = data.curriculum_completion || 0; document.getElementById("f-professional_dept").value = data.professional_dept || ""; document.getElementById("f-nep_participation").value = data.nep_participation || "";
            }
        });
    </script>
</body>
</html>
