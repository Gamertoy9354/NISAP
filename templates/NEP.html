<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <title>Modern Dark PDF Reader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'primary': '#93c5fd',
                        'secondary': '#374151',
                        'background': '#1f2937',
                        'sidebar-bg': '#111827',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    spacing: {
                        '64': '16rem',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="static/NEP.css">
</head>
<body class="bg-background font-sans transition-colors duration-300">

    <aside id="sidebar" class="fixed left-0 top-0 h-screen w-64 bg-sidebar-bg text-gray-200 shadow-2xl p-4 flex flex-col justify-between z-30 border-r border-gray-700">
        <div>
            <h1 class="text-xl font-bold text-primary mb-8 border-b border-gray-700 pb-3">Document Tools</h1>
            
            <div class="space-y-4">
               <a href="{{ url_for('index') }}"><button 
                        class="w-full sidebar-btn bg-gray-700 hover:bg-primary hover:text-gray-900 transition duration-200">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Go Back to Services
                </button></a>
                    <br>
                    <br>
               <a href="{{ url_for('AI') }}"> <button
                        class="w-full sidebar-btn bg-primary text-gray-900 font-semibold hover:bg-sky-400 transition duration-200">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    Ask AI About Document
                </button></a>
            </div>
        </div>
        
        <p class="text-xs text-gray-500">Powered by PDF.js</p>
    </aside>

    <div id="main-container" class="ml-64 w-main-content">

        <div id="controls" class="fixed left-64 w-main-content top-0 bg-secondary shadow-xl z-20 transition-all duration-300 border-b border-gray-700">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 flex items-center justify-between">
                
                <div class="flex items-center space-x-2">
                    <button id="prev-page" class="control-btn p-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    </button>

                    <div class="flex items-center bg-gray-600 rounded-lg overflow-hidden">
                        <input type="number" id="page-num-input" value="1" min="1" 
                                class="w-12 text-center bg-gray-600 text-primary text-sm font-medium focus:outline-none focus:ring-0 p-2 
                                        rounded-l-lg border-r border-gray-700 dark:text-white dark:placeholder-gray-400">
                        
                        <span id="page-count" class="text-sm text-gray-300 font-medium p-2">/ N</span>
                    </div>

                    <button id="next-page" class="control-btn p-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </button>
                </div>

                <div class="flex items-center space-x-3">
                    <button id="zoom-out" class="control-btn px-3 py-2 text-sm">
                        Zoom -
                    </button>
                    <div class="text-sm font-medium text-primary w-16 text-center" id="zoom-level">150%</div>
                    <button id="zoom-in" class="control-btn px-3 py-2 text-sm">
                        Zoom +
                    </button>
                </div>

            </div>
        </div>
        
        <main class="pt-20 pb-10 flex flex-col items-center min-h-screen">
            <div id="loading-message" class="text-lg text-primary font-semibold hidden">Loading document...</div>
            
            <div id="pdf-canvas-wrapper" class="mt-4 px-4">
                <canvas id="pdf-canvas"></canvas>
            </div>
            
        </main>
    </div>

    <script>
        document.querySelectorAll('.control-btn').forEach(btn => {
            btn.classList.add(
                'text-gray-200', 'bg-gray-700', 'hover:bg-primary', 'hover:text-gray-900', 
                'rounded-lg', 'transition', 'duration-150', 'ease-in-out', 
                'border', 'border-gray-600', 'shadow-md'
            );
        });
        
        document.querySelectorAll('.sidebar-btn').forEach(btn => {
             btn.classList.add('flex', 'items-center', 'justify-center', 'py-3', 'rounded-xl', 'shadow-lg');
        });

        function showAIPromptModal() {
            console.log('AI button clicked. Launching AI interaction modal...');
            alert('AI Feature: Ready to answer questions about the document!');
        }
    </script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs" type="module"></script>
    
    <script type="module">
        import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs';

        const PDF_URL = 'static\\POLICY-2020.pdf';
        
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.mjs';

        let pdfDoc = null;
        let currentPage = 1;
        let scale = 1.5; 
        const ZOOM_INCREMENT = 0.25;
        const SIDEBAR_WIDTH = 256; 

        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');
        const pageNumInput = document.getElementById('page-num-input');
        const totalPagesSpan = document.getElementById('page-count');
        const zoomLevelDisplay = document.getElementById('zoom-level');
        const loadingMessage = document.getElementById('loading-message');

        async function renderPage(num) {
            if (!pdfDoc) return;
            if (num < 1 || num > pdfDoc.numPages) return;

            currentPage = num;
            pageNumInput.value = num;
            zoomLevelDisplay.textContent = `${Math.round(scale * 100)}%`;
            loadingMessage.classList.add('hidden'); 

            try {
                const page = await pdfDoc.getPage(num);
                let viewport = page.getViewport({ scale: scale });

                const availableWidth = window.innerWidth > 768 ? window.innerWidth - SIDEBAR_WIDTH : window.innerWidth;
                const wrapperWidth = availableWidth * 0.95; 
                
                const minScale = wrapperWidth / page.getViewport({ scale: 1 }).width;

                if (scale * page.getViewport({ scale: 1 }).width > wrapperWidth && scale < minScale) {
                    scale = minScale;
                    viewport = page.getViewport({ scale: scale });
                }

                canvas.height = viewport.height;
                canvas.width = viewport.width;

                const renderContext = {
                    canvasContext: ctx,
                    viewport: viewport,
                };

                await page.render(renderContext).promise;

            } catch (error) {
                console.error('Error rendering page:', error);
            }
        }

        async function loadPdf() {
            loadingMessage.classList.remove('hidden');
            try {
                const loadingTask = pdfjsLib.getDocument(PDF_URL);
                pdfDoc = await loadingTask.promise;
                totalPagesSpan.textContent = `/ ${pdfDoc.numPages}`;
                fitToScreen(); 
                await renderPage(currentPage);

            } catch (error) {
                console.error('Error loading PDF:', error);
                loadingMessage.textContent = 'Error loading PDF document. Check console for details. (Likely a network or CORS issue)';
            }
        }
        
        function fitToScreen() {
            if (!pdfDoc || !canvas) return;
            const tempScale = 1;
            pdfDoc.getPage(1).then(page => {
                const tempViewport = page.getViewport({ scale: tempScale });
                
                const availableWidth = window.innerWidth > 768 ? window.innerWidth - SIDEBAR_WIDTH : window.innerWidth;
                const wrapperWidth = availableWidth * 0.95; 

                scale = wrapperWidth / tempViewport.width;
                scale = Math.min(scale, 2.0); 
            }).then(() => {
                renderPage(currentPage);
            });
        }

        document.getElementById('prev-page').addEventListener('click', () => {
            if (currentPage > 1) {
                renderPage(currentPage - 1);
            }
        });

        document.getElementById('next-page').addEventListener('click', () => {
            if (currentPage < pdfDoc.numPages) {
                renderPage(currentPage + 1);
            }
        });

        pageNumInput.addEventListener('change', (e) => {
            const desiredPage = parseInt(e.target.value);
            if (pdfDoc && desiredPage >= 1 && desiredPage <= pdfDoc.numPages) {
                renderPage(desiredPage);
            } else {
                e.target.value = currentPage;
            }
        });

        document.getElementById('zoom-in').addEventListener('click', () => {
            scale = Math.min(scale + ZOOM_INCREMENT, 3.0); 
            renderPage(currentPage);
        });

        document.getElementById('zoom-out').addEventListener('click', () => {
            scale = Math.max(scale - ZOOM_INCREMENT, 0.5); 
            renderPage(currentPage);
        });

        window.addEventListener('resize', () => {
            fitToScreen();
        });

        loadPdf();
    </script>
</body>
</html>
